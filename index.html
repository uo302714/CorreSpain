<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--surface3:#222236;--text:#e8e8f0;--text2:#9898b0;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--orange:#fdcb6e;--red:#e17055;--blue:#74b9ff;--beach:#00cec9;--forest:#00b894;--mountain:#e17055;--urban:#fdcb6e;--mixed:#a29bfe;--radius:12px;--radius-sm:8px}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
.app{display:flex;height:100vh;width:100vw;position:relative}
#map{flex:1;z-index:1}
.sidebar{width:420px;background:var(--surface);display:flex;flex-direction:column;z-index:2;border-right:1px solid var(--surface3);transition:transform .3s}
.sidebar-header{padding:20px;border-bottom:1px solid var(--surface3)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{font-size:12px;color:var(--text2);background:var(--surface3);padding:3px 8px;border-radius:20px}
.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2)}
.filters{display:flex;flex-wrap:wrap;gap:6px}
.filter-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--surface3);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-section{margin-top:10px}
.filter-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.spot-list{flex:1;overflow-y:auto;padding:12px}
.spot-count{font-size:12px;color:var(--text2);padding:0 8px 10px;font-style:italic}
.spot-card{background:var(--surface2);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:all .2s;overflow:hidden;border:1px solid transparent}
.spot-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.spot-card-img{width:100%;height:140px;object-fit:cover;display:block;image-rendering:auto;background:var(--surface3)}
.spot-card-body{padding:12px 14px}
.spot-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.spot-card h3{font-size:14px;font-weight:600;line-height:1.3;flex:1}
.spot-card-terrain{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;white-space:nowrap;margin-left:8px}
.terrain-beach{background:rgba(0,206,201,.15);color:var(--beach)}
.terrain-forest{background:rgba(0,184,148,.15);color:var(--forest)}
.terrain-mountain{background:rgba(225,112,85,.15);color:var(--mountain)}
.terrain-urban{background:rgba(253,203,110,.15);color:var(--urban)}
.terrain-mixed{background:rgba(162,155,254,.15);color:var(--mixed)}
.spot-card-meta{display:flex;gap:12px;font-size:12px;color:var(--text2)}
.spot-card-meta span{display:flex;align-items:center;gap:4px}
.spot-distances{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.dist-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--surface3);color:var(--text2)}
.detail-panel{position:fixed;top:0;right:0;width:480px;height:100vh;background:var(--surface);z-index:1000;transform:translateX(100%);transition:transform .3s;overflow-y:auto;border-left:1px solid var(--surface3)}
.detail-panel.open{transform:translateX(0)}
.detail-img{width:100%;height:240px;object-fit:cover;display:block;image-rendering:auto;background:var(--surface3)}
.detail-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.detail-body{padding:24px}
.detail-body h2{font-size:22px;font-weight:700;margin-bottom:4px}
.detail-location{color:var(--text2);font-size:14px;margin-bottom:16px}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.detail-desc{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:20px}
.detail-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat-box{background:var(--surface2);padding:12px;border-radius:var(--radius-sm);text-align:center}
.stat-box .val{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--accent2)}
.stat-box .label{font-size:11px;color:var(--text2);margin-top:2px}
.detail-actions{display:flex;gap:10px;margin-bottom:24px}
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--surface3)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-fav{background:none;border:1px solid var(--surface3);color:var(--text2);font-size:20px;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s}
.btn-fav.active{color:var(--red);border-color:var(--red)}
.run-log-section{border-top:1px solid var(--surface3);padding-top:20px}
.run-log-section h3{font-size:16px;margin-bottom:12px}
.run-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.run-form .full{grid-column:1/-1}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.run-history{max-height:300px;overflow-y:auto}
.run-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px}
.run-entry-info{flex:1}
.run-entry-date{font-size:12px;color:var(--text2)}
.run-entry-stats{display:flex;gap:16px;font-size:13px}
.run-entry-stats span{display:flex;align-items:center;gap:4px}
.run-entry-pace{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--green)}
.run-entry-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:4px;opacity:.5;transition:opacity .2s}
.run-entry-del:hover{opacity:1;color:var(--red)}
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.auth-box{width:380px;background:var(--surface);padding:40px;border-radius:16px;border:1px solid var(--surface3)}
.auth-box h2{font-size:26px;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-box p{text-align:center;color:var(--text2);font-size:14px;margin-bottom:24px}
.auth-box .form-group{margin-bottom:14px}
.auth-box .btn{width:100%;padding:12px;font-size:15px;margin-top:6px}
.auth-switch{text-align:center;margin-top:166px;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch a{color:var(--accent2);cursor:pointer;text-decoration:none}
.auth-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;display:none}
.user-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid var(--surface3);background:var(--surface2)}
.user-bar .avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.user-bar .uname{flex:1;font-size:13px;font-weight:500}
.user-bar .ustats{font-size:11px;color:var(--text2)}
.user-bar button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px}
.nav-tabs{display:flex;border-bottom:1px solid var(--surface3)}
.nav-tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.nav-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block;flex:1;overflow-y:auto}
.my-runs-panel{padding:16px}
.my-runs-panel h3{font-size:16px;margin-bottom:4px}
.my-runs-panel .subtitle{font-size:12px;color:var(--text2);margin-bottom:16px}
.overall-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.overall-stat{background:var(--surface2);padding:10px;border-radius:var(--radius-sm);text-align:center}
.overall-stat .val{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700}
.overall-stat .label{font-size:10px;color:var(--text2);margin-top:2px}
.mobile-toggle{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(108,92,231,.4);font-family:'DM Sans',sans-serif}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}
.overlay-bg.show{display:block}
@media(max-width:768px){
.sidebar{position:fixed;top:0;left:0;width:100%;height:70vh;bottom:0;top:auto;border-radius:20px 20px 0 0;transform:translateY(100%);border-right:none;border-top:1px solid var(--surface3)}
.sidebar.open{transform:translateY(0);z-index:1000}
.mobile-toggle{display:block}
.detail-panel{width:100%;border-radius:20px 20px 0 0;height:85vh;top:auto;bottom:0;transform:translateY(100%)}
.detail-panel.open{transform:translateY(0)}
}
.leaflet-container{background:var(--bg)!important}
.spot-popup{font-family:'DM Sans',sans-serif;min-width:200px}
.spot-popup h4{font-family:'Space Grotesk',sans-serif;font-size:14px;margin-bottom:4px}
.spot-popup p{font-size:12px;color:#666;margin-bottom:6px}
.spot-popup .pop-btn{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.no-results{text-align:center;padding:40px 20px;color:var(--text2)}
.no-results svg{margin-bottom:12px;opacity:.4}
.no-results p{font-size:14px}
</style>
</head>

// ============ LOCAL MAPILLARY PHOTO SYSTEM ============
function getLocalPhoto(spotId) {
  return `fotos/spot_${spotId}.jpg`;
}

// --- Lazy-load photos via IntersectionObserver ---
let photoObserver = null;
function setupLazyPhotos() {
  if (photoObserver) photoObserver.disconnect();
  photoObserver = new IntersectionObserver((entries) => {
    entries.forEach(async (entry) => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      photoObserver.unobserve(img);
      img.src = img.dataset.src;
      img.onload = () => { img.classList.remove('sv-loading'); };
      img.onerror = () => { img.style.display='none'; };
    });
  }, { root: document.querySelector('.spot-list'), rootMargin: '300px' });
  document.querySelectorAll('.spot-card-img[data-src]').forEach(img => photoObserver.observe(img));
}

// ============ AUTH SYSTEM ============
let currentUser = null;
let isLogin = true;

async function hashPassword(pass, salt) {
  const enc = new TextEncoder();
  const data = enc.encode(salt + pass);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getUsers() { return JSON.parse(localStorage.getItem('cs_users')||'{}'); }
function saveUsers(u) { localStorage.setItem('cs_users', JSON.stringify(u)); }
function getFavorites() { return JSON.parse(localStorage.getItem('cs_favs_'+currentUser.email)||'[]'); }
function saveFavorites(f) { localStorage.setItem('cs_favs_'+currentUser.email, JSON.stringify(f)); }
function getRuns() { return JSON.parse(localStorage.getItem('cs_runs_'+currentUser.email)||'[]'); }
function saveRuns(r) { localStorage.setItem('cs_runs_'+currentUser.email, JSON.stringify(r)); }

function toggleAuthMode() {
  isLogin = !isLogin;
  document.getElementById('authNameGroup').style.display = isLogin ? 'none' : 'block';
  document.getElementById('authBtn').textContent = isLogin ? 'Iniciar sesión' : 'Crear cuenta';
  document.getElementById('authSwitchText').textContent = isLogin ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?';
  document.getElementById('authSwitchLink').textContent = isLogin ? 'Regístrate' : 'Inicia sesión';
  document.getElementById('authError').style.display = 'none';
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  if (!email || !pass) { errEl.textContent='Completa todos los campos'; errEl.style.display='block'; return; }
  const users = getUsers();
  if (isLogin) {
    const user = users[email];
    if (!user) { errEl.textContent='Email no registrado'; errEl.style.display='block'; return; }
    const hash = await hashPassword(pass, user.salt);
    if (hash !== user.hash) { errEl.textContent='Contraseña incorrecta'; errEl.style.display='block'; return; }
    currentUser = { email, name: user.name };
  } else {
    const name = document.getElementById('authName').value.trim();
    if (!name) { errEl.textContent='Introduce tu nombre'; errEl.style.display='block'; return; }
    if (users[email]) { errEl.textContent='Email ya registrado'; errEl.style.display='block'; return; }
    const salt = crypto.getRandomValues(new Uint8Array(16)).join('');
    const hash = await hashPassword(pass, salt);
    users[email] = { name, salt, hash };
    saveUsers(users);
    currentUser = { email, name };
  }
  localStorage.setItem('cs_session', JSON.stringify(currentUser));
  startApp();
}

function logout() {
  localStorage.removeItem('cs_session');
  currentUser = null;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function checkSession() {
  const s = localStorage.getItem('cs_session');
  if (s) { currentUser = JSON.parse(s); startApp(); }
}

let map, markers = [], activeFilters = { terrain:'all', dist:'all', diff:'all' };

function startApp() {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = currentUser.name;
  updateRunCount();
  initMap();
  renderSpots();
}

function initMap() {
  if (map) return;
  map = L.map('map',{zoomControl:false}).setView([40.0,-3.7],6);
  L.control.zoom({position:'topright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO', maxZoom:19
  }).addTo(map);
}

function getMarkerColor(terrain) {
  const c = {beach:'#00cec9',forest:'#00b894',mountain:'#e17055',urban:'#fdcb6e',mixed:'#a29bfe'};
  return c[terrain]||'#a29bfe';
}

function createMarkerIcon(terrain) {
  const color = getMarkerColor(terrain);
  return L.divIcon({
    className:'custom-marker',
    html:`<div style="width:14px;height:14px;background:${color};border-radius:50%;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 8px rgba(0,0,0,.4)"></div>`,
    iconSize:[14,14], iconAnchor:[7,7]
  });
}

function renderSpots() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = spots.filter(s => {
    if (activeFilters.terrain!=='all' && s.terrain!==activeFilters.terrain) return false;
    if (activeFilters.dist!=='all' && !s.distances.includes(activeFilters.dist)) return false;
    if (activeFilters.diff!=='all' && s.difficulty!==activeFilters.diff) return false;
    if (search && !s.name.toLowerCase().includes(search) && !s.city.toLowerCase().includes(search) && !s.community.toLowerCase().includes(search)) return false;
    return true;
  });
  
  document.getElementById('spotCount').textContent = `${filtered.length} de ${spots.length} spots`;
  markers.forEach(m=>map.removeLayer(m));
  markers = [];
  
  const list = document.getElementById('spotList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results"><p>No se encontraron spots con esos filtros</p></div>';
    return;
  }
  
  list.innerHTML = filtered.map(s => `
    <div class="spot-card" onclick="openDetail(${s.id})">
      <img class="spot-card-img sv-loading" data-src="${s.photo}" alt="${s.name}">
      <div class="spot-card-body">
        <div class="spot-card-top">
          <h3>${s.name}</h3>
          <span class="spot-card-terrain terrain-${s.terrain}">${terrainLabels[s.terrain]}</span>
        </div>
        <div class="spot-card-meta">
          <span>📍 ${s.city}</span>
          <span>📊 ${diffLabels[s.difficulty]}</span>
        </div>
        <div class="spot-distances">${s.distances.map(d=>`<span class="dist-tag">${d}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
  
  filtered.forEach(s => {
    const m = L.marker([s.lat,s.lng],{icon:createMarkerIcon(s.terrain)}).addTo(map);
    m.bindPopup(`<div class="spot-popup"><h4>${s.name}</h4><p>${s.city}, ${s.community}</p><button class="pop-btn" onclick="openDetail(${s.id})">Ver detalle</button></div>`);
    markers.push(m);
  });
  setTimeout(setupLazyPhotos, 50);
}

function setFilter(type, btn) {
  const container = btn.parentElement;
  container.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilters[type] = btn.dataset.filter;
  filterSpots();
}

function showRunForm(id) {
  const form = document.getElementById(`runForm-${id}`);
  form.style.display = form.style.display==='none'?'grid':'none';
}

function saveRun(spotId) {
  const dist = document.getElementById(`rf-dist-${spotId}`).value;
  const time = document.getElementById(`rf-time-${spotId}`).value;
  const date = document.getElementById(`rf-date-${spotId}`).value;
  const feel = document.getElementById(`rf-feel-${spotId}`).value;
  const notes = document.getElementById(`rf-notes-${spotId}`).value;
  if (!dist||!time||!date) return;
  const pace = calcPace(parseFloat(dist), time);
  const runs = getRuns();
  runs.push({ id: Date.now().toString(), spotId, distance:dist, time, date, feel, notes, pace });
  saveRuns(runs);
  updateRunCount();
  openDetail(spotId);
}

function deleteRun(runId, spotId) {
  const runs = getRuns().filter(r=>r.id!==runId);
  saveRuns(runs);
  updateRunCount();
  openDetail(spotId);
}

function calcPace(distKm, timeStr) {
  const parts = timeStr.split(':').map(Number);
  let totalMin;
  if (parts.length===3) totalMin = parts[0]*60+parts[1]+parts[2]/60;
  else if (parts.length===2) totalMin = parts[0]+parts[1]/60;
  else return '—';
  const pace = totalMin/distKm;
  const pMin = Math.floor(pace);
  const pSec = Math.round((pace-pMin)*60);
  return `${pMin}:${pSec.toString().padStart(2,'0')}`;
}

function getBestPace(runs) {
  let best = Infinity;
  let bestStr = '—';
  runs.forEach(r=>{
    const parts = r.pace.split(':').map(Number);
    if(parts.length===2){const t=parts[0]*60+parts[1];if(t<best){best=t;bestStr=r.pace;}}
  });
  return bestStr;
}

function formatDate(d) {
  const date = new Date(d);
  return date.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
}

function feelEmoji(f) {
  const m={great:'💪',good:'😊',ok:'😐',hard:'😤',bad:'😵'};
  return m[f]||'';
}

function toggleFav(id, btn) {
  let favs = getFavorites();
  if (favs.includes(id)) { favs = favs.filter(f=>f!==id); btn.classList.remove('active'); btn.textContent='♡'; }
  else { favs.push(id); btn.classList.add('active'); btn.textContent='♥'; }
  saveFavorites(favs);
}

function updateRunCount() {
  const runs = getRuns();
  document.getElementById('userRunCount').textContent = `${runs.length} runs registrados`;
}

  const favSpots = spots.filter(s=>favs.includes(s.id));
  list.innerHTML = favSpots.map(s=>`
    <div class="spot-card" onclick="openDetail(${s.id})">
      <img class="spot-card-img" src="${s.photo}" alt="${s.name}" onerror="this.style.display='none'">
      <div class="spot-card-body">
        <div class="spot-card-top"><h3>${s.name}</h3><span class="spot-card-terrain terrain-${s.terrain}">${terrainLabels[s.terrain]}</span></div>
        <div class="spot-card-meta"><span>📍 ${s.city}</span></div>
      </div>
    </div>
  `).join('');
}

function renderMyRuns() {
  const runs = getRuns().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const panel = document.getElementById('runsPanel');
  const totalDist = runs.reduce((sum,r)=>sum+parseFloat(r.distance),0);
  const totalRuns = runs.length;
  const uniqueSpots = [...new Set(runs.map(r=>r.spotId))].length;
  const bestPace = runs.length>0 ? getBestPace(runs) : '—';

  panel.innerHTML = `
    <h3>Mis carreras</h3>
    <p class="subtitle">Tu historial completo de running</p>
    <div class="overall-stats">
      <div class="overall-stat"><div class="val">${totalRuns}</div><div class="label">Carreras</div></div>
      <div class="overall-stat"><div class="val">${totalDist.toFixed(1)}</div><div class="label">km totales</div></div>
      <div class="overall-stat"><div class="val">${uniqueSpots}</div><div class="label">Spots</div></div>
      <div class="overall-stat"><div class="val">${bestPace}</div><div class="label">Mejor pace</div></div>
    </div>
    ${runs.length===0?'<p style="color:var(--text2);text-align:center;padding:20px">Registra tu primera carrera desde un spot</p>':''}
    <div class="run-history">
      ${runs.map(r=>{
        const spot = spots.find(s=>s.id===r.spotId);
        return `<div class="run-entry" onclick="openDetail(${r.spotId})" style="cursor:pointer">
          <div class="run-entry-info">
            <div class="run-entry-date">${formatDate(r.date)} · ${spot?spot.name:'Spot'} · ${feelEmoji(r.feel)}</div>
            <div class="run-entry-stats">
              <span>📏 ${r.distance} km</span>
              <span>⏱ ${r.time}</span>
              <span class="run-entry-pace">⚡ ${r.pace} /km</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ============ MOBILE ============
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bg = document.getElementById('overlayBg');
  sb.classList.toggle('open');
  bg.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlayBg').classList.remove('show');
}

// ============ SERVICE WORKER REGISTRATION ============
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('¡Service Worker registrado con éxito!', reg))
      .catch(err => console.error('Error al registrar el Service Worker', err));
  });
}

// ============ INIT ============
function waitForLeaflet(cb) {
  if (typeof L !== 'undefined') cb();
  else setTimeout(() => waitForLeaflet(cb), 50);
}
if (document.readyState === 'complete') {
  waitForLeaflet(checkSession);
} else {
  window.addEventListener('load', () => waitForLeaflet(checkSession));
}
</script>
